name: Inject Protection

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject protection into HTML files
        run: |
          CODE='<script>document.addEventListener("contextmenu",function(e){e.preventDefault()});document.addEventListener("keydown",function(e){if(e.key==="F12"||e.keyCode===123||(e.ctrlKey&&(e.key==="u"||e.keyCode===85))||(e.ctrlKey&&e.shiftKey&&(e.key==="I"||e.keyCode===73))||(e.ctrlKey&&e.shiftKey&&(e.key==="J"||e.keyCode===74))||(e.ctrlKey&&(e.key==="s"||e.keyCode===83))){e.preventDefault()}});document.addEventListener("selectstart",function(e){if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")e.preventDefault()});document.addEventListener("dragstart",function(e){e.preventDefault()});document.addEventListener("copy",function(e){if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")e.preventDefault()});</script><style>body{-webkit-user-select:none;user-select:none}</style>'
          
          for f in $(find . -name "*.html"); do
            if ! grep -q "data-protection-injected" "$f"; then
              sed -i "s|<head>|<head>\n    ${CODE}\n    <!-- data-protection-injected -->|" "$f"
              echo "✓ 已注入: $f"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "没有文件被修改"
          else
            git commit -m "注入防护代码 [skip ci]"
            git push
          fi
