name: Inject Protection Code into All HTML Files

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Find and inject protection into all HTML files
        run: |
          PROTECTION_CODE='<script>(function(){function p(e){e.preventDefault();return false}document.addEventListener("contextmenu",p);document.addEventListener("keydown",function(e){var k=e.key||e.keyCode,c=e.ctrlKey||e.metaKey,s=e.shiftKey;if(k==="F12"||e.keyCode===123||(c&&(k==="u"||e.keyCode===85))||(c&&s&&(k==="I"||e.keyCode===73))||(c&&s&&(k==="J"||e.keyCode===74))||(c&&(k==="s"||e.keyCode===83))||(c&&s&&(k==="C"||e.keyCode===67))||(c&&(k==="p"||e.keyCode===80))||(c&&(k==="n"||e.keyCode===78))){e.preventDefault();e.stopPropagation();return false}if([116,123].includes(e.keyCode)){e.preventDefault();return false}});document.addEventListener("selectstart",function(e){if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")e.preventDefault()});document.addEventListener("dragstart",p);document.addEventListener("copy",function(e){if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")p(e)});document.addEventListener("cut",function(e){if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")p(e)});document.addEventListener("paste",function(e){if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")p(e)});window.addEventListener("beforeprint",p);if(window.top!==window.self){window.top.location=window.self.location}if(typeof console!=="undefined"){console.log=function(){};console.warn=function(){};console.error=function(){};console.clear=function(){}}})();</script><style>body{-webkit-touch-callout:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;cursor:default}</style>'
          
          find . -name "*.html" -type f | while read file; do
            echo "处理文件: $file"
            if grep -q "data-protection-injected" "$file" 2>/dev/null; then
              echo "  跳过（已包含）: $file"
              continue
            fi
            if grep -q "<head>" "$file"; then
              sed -i "s|<head>|<head>\n    ${PROTECTION_CODE}\n    <!-- data-protection-injected -->|" "$file"
              echo "  已注入: $file"
            elif grep -q "<html" "$file"; then
              sed -i "0,/<html[^>]*>/s||&\n<head>\n    ${PROTECTION_CODE}\n    <!-- data-protection-injected -->\n</head>|" "$file"
              echo "  已注入: $file"
            else
              echo -e "<!DOCTYPE html>\n<html>\n<head>\n    ${PROTECTION_CODE}\n    <!-- data-protection-injected -->\n</head>\n<body>\n$(cat "$file")\n</body>\n</html>" > "$file"
              echo "  已注入: $file"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto-inject protection code into HTML files"
          git push
